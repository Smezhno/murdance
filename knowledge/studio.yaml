# =============================================================================
# Policies — правила студии
# =============================================================================
policies:
  cancellation: "Для аренды зала: отмена за <48 часов — без переноса; раньше — перенос возможен. Для занятий: бесплатно за 2 часа (из старого KB, подтвердить)."
  trial_class: "Первое пробное занятие бесплатно! Записывайтесь через бота или '+' в комментариях."
  what_to_bring: "Удобная спортивная одежда, сменная чистая обувь (оранжевые тапочки в студии). Для High Heels — каблуки от 7 см (без черной подошвы). Студия продает каблуки, стрипсы, наколенники."
  late_arrival: "Опоздание до 15 минут — можно присоединиться (из старого KB, подтвердить)."
  general_rules: "Вход только в чистой сменной обуви. Поддерживать чистоту. Нет ответственности за потерянные вещи (выбрасывают через 2 дня). Материальная ответственность за ущерб оборудованию. Без каблуков с черной подошвой."
  hall_rental: "Час аренды — 55 мин. Предоплата 100%. Оборудование: Bluetooth-колонка, кондиционеры, неоновая подсветка, кулер. Цены: от 800₽/час (off-peak) до 2000₽/час (peak)."
  other: "Студия для девушек, дружное женское сообщество. Регулярные вечеринки, концерты, мастер-классы. Профессиональные видео-съемки в курсах."

# =============================================================================
# FAQ — частые вопросы
# =============================================================================
faq:
  - q: "Сколько стоит занятие?"
    a: "Разовое: 900₽ (1 час) или 1300₽ (1.5 часа). Пробное — бесплатно. Абонементы от 3900₽ за 4 занятия. Курсы от 5500₽ с видео."

  - q: "Есть ли пробное занятие?"
    a: "Да, первое пробное бесплатно. Неделя пробных zero-level — 990₽. Запишитесь через бота или Telegram."

  - q: "Что взять с собой?"
    a: "Удобную одежду, сменную обувь. Для High Heels — каблуки (скидка 20% на первые). Без черной подошвы."

  - q: "Как отменить запись?"
    a: "Для занятий: бесплатно за 2 часа. Для аренды: <48 часов — без возврата. Напишите в чат или администратору."

  - q: "Какие есть абонементы?"
    a: "Групповые: 4 занятия — 3900₽, 8 — 5100₽/6100₽, 12 — 6100₽, безлимит — 7900₽. Скидки для новичков (10% или 990₽)."

  - q: "Есть ли детские группы?"
    a: "Нет, студия для взрослых девушек (из отзывов и описаний). Фокус на женских стилях."

  - q: "Как добраться до студии?"
    a: "4 филиала во Владивостоке: Семеновская (возле ТЦ Изумруд), Чуркин (ДЦ Чайка), Гоголя, Алеутская. Парковка зависит от филиала."

  - q: "Какие есть филиалы?"
    a: "Семеновская, Чуркин, Гоголя, Алеутская. Адреса и телефоны в студио-инфо."

  - q: "Кто преподаватели?"
    a: "Более 30 опытных преподавателей, таких как Настя Гевондова (>15 лет, чемпионаты), Настя Гольдберг (17 лет в танцах), Эвелина Дыбалюк (работа с новичками). Полный список в teachers с биографиями и опытом."

  - q: "Есть ли индивидуальные занятия?"
    a: "Да, персональный тренинг доступен. Цены на разовые индивидуальные — уточняйте в CRM."

  - q: "Что еще предлагает студия?"
    a: "Аренда залов (от 800₽/час), мастер-классы (от 3500₽), курсы с видео-съемкой, вечеринки, постановки номеров, подарочные сертификаты."

  - q: "Почему выбрать High Heels?"
    a: "Раскроет твою женственность, улучшит осанку и уверенность. Курсы с нуля, видео в подарок. Идеально для новичков!"

  - q: "Что такое Dancehall Female?"
    a: "Энергичный женский стиль с элементами тверкинга и хип-хопа. Развивает смелость и пластику. Педагог с >15 лет опытом поможет даже с нуля."

