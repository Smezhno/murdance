    price_single: 900
    aliases: ["хай хилс", "хай хилз", "хай-хилс", "хай-хиллс", "хай хиллс", "хайхилс",
              "хайхилз", "хайхиллс", "хай хил", "хилс", "хиллс", "хилз", "хиилс",
              "хиилз", "танцы на каблук", "хай хилс танец", "high heels", "high heels dance",
