# Prompt regression test: Booking flow happy path
# Per CONTRACT §21: YAML test suites with user input → expected (contains/not_contains)
# Directions in Тест branch: Dancehall, Girly Hip-Hop, High Heels

name: "Booking Flow Happy Path"
description: "Complete booking flow from greeting to confirmation (6 steps)"

tests:
  - name: "step_1_greeting"
    user: "Привет"
    expected:
      contains_one_of:
        - "привет"
        - "помог"
        - "интерес"
        - "запис"
        - "направлен"
      not_contains:
        - "ошибка"
        - "error"

  - name: "step_2_booking_with_direction"
    user: "Хочу записаться на high heels"
    expected:
      contains_one_of:
        - "High Heels"
        - "high heels"
        - "каблук"
        - "филиал"
        - "когда"
      not_contains:
        - "ошибка"

  - name: "step_3_datetime"
    user: "Среда"
    expected:
      not_contains:
        - "ошибка"

  - name: "step_4_contact_info"
    user: "Меня зовут Иван, телефон +79991234567"
    expected:
      contains:
        - "Иван"
      not_contains:
        - "ошибка"

  - name: "step_5_confirmation_prompt"
    user: "Подтверждаю"
    expected:
      not_contains:
        - "ошибка"
        - "не удалось"

  - name: "step_6_reset"
    user: "/start"
    expected:
      contains_one_of:
        - "привет"
        - "здравствуйте"
        - "помог"
        - "интерес"
        - "направлен"
      not_contains:
        - "ошибка"
