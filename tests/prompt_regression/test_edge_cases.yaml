# Prompt regression test: Edge cases
# Per CONTRACT §21: YAML test suites with user input → expected (contains/not_contains)

name: "Edge Cases Tests"
description: "Unknown direction, empty message, cancel mid-flow"

tests:
  - name: "unknown_direction"
    user: "Хочу записаться на бачату"
    expected:
      contains:
        - "не нашла"
      not_contains:
        - "ошибка"

  - name: "empty_message_handling"
    user: ""
    expected:
      contains:
        - "помочь"
      not_contains:
        - "ошибка"

  - name: "start_resets_session"
    user: "/start"
    expected:
      contains:
        - "Здравствуйте"
      not_contains:
        - "ошибка"

  - name: "schedule_query_shows_real_data"
    user: "Какое расписание?"
    expected:
      contains:
        - "расписание"
      not_contains:
        - "ошибка"
        - "не заполнено"
        - "уточню у администратора"

  - name: "booking_dancehall"
    user: "Хочу записаться на dancehall"
    expected:
      contains:
        - "Dancehall"
      not_contains:
        - "ошибка"

  - name: "cancel_booking"
    user: "/start"
    expected:
      contains:
        - "Здравствуйте"
      not_contains:
        - "ошибка"

  - name: "invalid_time_format"
    user: "Хочу записаться на high heels в 25:00"
    expected:
      contains:
        - "High Heels"
      not_contains:
        - "ошибка"
        - "25:00"
