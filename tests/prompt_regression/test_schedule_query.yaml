# Prompt regression test: Schedule queries
# Per CONTRACT §21: YAML test suites with user input → expected (contains/not_contains)
# Branch "Тест" has: Dancehall (Ср/Пт 20:00), Girly Hip-Hop (Вт/Чт/Сб 19:00), High Heels (Ср/Пт 19:00)

name: "Schedule Query Tests"
description: "Various schedule query scenarios — must return real CRM data"

tests:
  - name: "query_full_schedule"
    user: "Покажи расписание"
    expected:
      contains:
        - "расписание"
      not_contains:
        - "ошибка"
        - "не заполнено"
        - "уточню у администратора"

  - name: "query_dancehall_schedule"
    user: "Расписание Dancehall"
    expected:
      contains:
        - "Dancehall"
      not_contains:
        - "ошибка"
        - "не заполнено"

  - name: "query_high_heels_schedule"
    user: "Когда High Heels?"
    expected:
      contains:
        - "High Heels"
      not_contains:
        - "ошибка"
        - "не заполнено"

  - name: "query_no_hallucination"
    user: "Расписание на неделю"
    expected:
      contains:
        - "расписание"
      not_contains:
        - "ошибка"
        - "не заполнено"
        - "уточню у администратора"

  - name: "booking_shows_direction_schedule"
    user: "/start"
    expected:
      contains:
        - "Здравствуйте"
      not_contains:
        - "ошибка"
