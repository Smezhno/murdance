services:
  postgres:
    image: postgres:15-alpine
    container_name: dancebot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dancebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dancebot}
    # No ports: block — app and worker reach postgres via dancebot-network.
    # For local debug: add `127.0.0.1:5432:5432` in a docker-compose.override.yml.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dancebot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dancebot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dancebot-app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Override .env values that differ inside Docker network
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dancebot-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dancebot-worker
    command: python -m worker.main
    env_file:
      - .env
    environment:
      # Override .env values that differ inside Docker network
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dancebot-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: dancebot-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - dancebot-network
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  dancebot-network:
    driver: bridge
