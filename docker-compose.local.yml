# Local development compose — no Caddy, no HTTPS.
# ngrok handles HTTPS tunneling locally.
# Usage: docker compose -f docker-compose.local.yml up --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: dancebot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dancebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dancebot}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dancebot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dancebot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dancebot-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dancebot-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dancebot-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dancebot-network
    restart: unless-stopped
    command: python -m worker.main

volumes:
  postgres-data:

networks:
  dancebot-network:
    driver: bridge
